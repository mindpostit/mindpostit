<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8C98A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFDF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF8E7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="100" height="100" rx="18" fill="url(#bgGrad)"/>

  <!-- 뒤 포스트잇 (살짝 기울어짐) -->
  <g transform="rotate(8, 62, 55)">
    <rect x="42" y="30" width="46" height="46" rx="4" fill="#F0D898" opacity="0.8"/>
  </g>

  <!-- 앞 포스트잇 -->
  <rect x="12" y="22" width="58" height="58" rx="4" fill="url(#paperGrad)" />

  <!-- 테이프 -->
  <rect x="30" y="16" width="22" height="12" rx="3" fill="#D4A574" opacity="0.6"/>

  <!-- 손글씨 라인들 -->
  <line x1="22" y1="44" x2="60" y2="44" stroke="#C9A875" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="55" x2="55" y2="55" stroke="#C9A875" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="66" x2="48" y2="66" stroke="#C9A875" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
</svg>
